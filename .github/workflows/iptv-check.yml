name: IPTV Auto Check
on:
  schedule:
    - cron: '0 18 */2 * *'
  workflow_dispatch:
  push:
    branches:
      - master
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  iptv-check:
    runs-on: ubuntu-latest
    outputs:
      final_count: ${{ steps.limit_check.outputs.final_count }}
      is_low: ${{ steps.pre_check.outputs.is_low }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: pip install requests httpx zhconv tqdm m3u8

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Pre-check existing source count
        id: pre_check
        run: |
          if [ -f live_ok.txt ]; then
            count=$(wc -l < live_ok.txt)
            echo "当前已有源：$count 条"
            echo "count=$count" >> "$GITHUB_OUTPUT"
            if [ "$count" -lt 600 ]; then
              echo "is_low=true" >> "$GITHUB_OUTPUT"
              echo "源数量 < 600，触发自动补充模式"
            else
              echo "is_low=false" >> "$GITHUB_OUTPUT"
              echo "源数量 >= 600，跳过自动补充"
            fi
          else
            echo "count=0" >> "$GITHUB_OUTPUT"
            echo "is_low=true" >> "$GITHUB_OUTPUT"
            echo "无现有源文件，触发自动补充"
          fi

      - name: Run auto1000 if needed
        if: steps.pre_check.outputs.is_low == 'true'
        run: python auto1000.py

      - name: Update config
        run: |
          cat > config.json << 'EOF'
          {
            "ENABLE_WEB_CHECK": true,
            "ENABLE_WEB_FETCH": true,
            "ENABLE_LOCAL_CHECK": true,
            "ENABLE_SPEED_CHECK": false,
            "ENABLE_CACHE": true,
            "MAX_WORKERS": 120,
            "FETCH_WORKERS": 20,
            "TIMEOUT_CN": 8,
            "TIMEOUT_OVERSEAS": 15,
            "RETRY_COUNT": 1,
            "MAX_LINKS_PER_NAME": 5,
            "FILTER_PRIVATE_IP": true,
            "ENABLE_QUALITY_FILTER": true,
            "MIN_QUALITY_SCORE": 5,
            "MIN_SPEED_MBPS": 0.001,
            "ENABLE_IPV6_OPTIMIZE": true,
            "ENABLE_RESOLUTION_FILTER": false,
            "FFPROBE_PROBESIZE": 2000000,
            "FFPROBE_ANALYZEDURATION": 5000000,
            "MAX_NEW_PLAYLISTS": 200,
            "PLAYLIST_QUALITY_SCORE": true,
            "web_sources": [
              "https://iptv-org.github.io/iptv/index.m3u",
              "https://iptv-org.github.io/iptv/countries/cn.m3u",
              "https://iptv-org.github.io/iptv/countries/tw.m3u",
              "https://iptv-org.github.io/iptv/countries/hk.m3u",
              "https://iptv-org.github.io/iptv/countries/mo.m3u",
              "https://raw.githubusercontent.com/hujingguang/ChinaIPTV/main/TaiWan.m3u8",
              "https://raw.githubusercontent.com/hujingguang/ChinaIPTV/main/HongKong.m3u8",
              "https://raw.githubusercontent.com/hujingguang/ChinaIPTV/main/Macao.m3u8",
              "https://raw.githubusercontent.com/MichaelJorky/Free-IPTV-M3U-Playlist/main/iptv-hongkong.m3u",
              "https://live.zbds.top/tv/iptv4.m3u",
              "https://peterhchina.github.io/iptv/CNTV-V4.m3u",
              "https://dsj-1312694395.cos.ap-guangzhou.myqcloud.com/dsj10.1.txt",
              "https://raw.githubusercontent.com/develop202/migu_video/refs/heads/main/interface.txt",
              "https://raw.githubusercontent.com/Guovin/iptv-api/gd/output/result.txt",
              "https://raw.githubusercontent.com/fanmingming/live/main/tv.m3u",
              "https://raw.githubusercontent.com/zxmlxw520/5566/refs/heads/main/fhtv.txt",
              "https://raw.githubusercontent.com/nianxinmj/nxpz/refs/heads/main/lib/live.txt",
              "https://raw.githubusercontent.com/big-mouth-cn/tv/main/iptv-ok.m3u",
              "https://live.264788.xyz/sub/02RvO5i5Zn1LSQUCr56kkUp2I9xa9A/txt",
              "https://raw.githubusercontent.com/FGBLH/FG/refs/heads/main/%E6%B8%AF%E5%8F%B0%E5%A4%A7%E9%99%86",
              "https://raw.githubusercontent.com/judy-gotv/iptv/main/litv.m3u",
              "https://live.hacks.tools/tv/ipv4/categories/hong_kong.m3u",
              "https://live.hacks.tools/tv/ipv4/categories/macau.m3u",
              "https://live.hacks.tools/tv/ipv4/categories/taiwan.m3u",
              "https://live.hacks.tools/iptv/languages/zho.m3u",
              "https://raw.githubusercontent.com/yuanzhouxia/zhwzczp/main/IPTV"
            ]
          }
          EOF

      - name: Run IPTV check
        run: python IPTV-Apex-dzh.py --async-crawl
        env:
          TZ: Asia/Shanghai

      - name: Post-check results
        id: post_check
        run: |
          if [ -f live_ok.txt ]; then
            lines=$(wc -l < live_ok.txt)
            echo "检查前 live_ok.txt: $lines 条"
            echo "final_count=$lines" >> "$GITHUB_OUTPUT"
          else
            echo "final_count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Limit sources to 2000
        id: limit_check
        run: |
          MAX_SOURCES=2000
          if [ -f live_ok.txt ]; then
            count=$(wc -l < live_ok.txt)
            echo "当前源数量：$count 条"
            if [ "$count" -gt "$MAX_SOURCES" ]; then
              echo "⚠️ 源数量超过 $MAX_SOURCES，正在截取前 $MAX_SOURCES 条..."
              head -n "$MAX_SOURCES" live_ok.txt > live_ok_temp.txt
              mv live_ok_temp.txt live_ok.txt
              echo "已截取至 $MAX_SOURCES 条"
              echo "limited=true" >> "$GITHUB_OUTPUT"
              echo "final_count=$MAX_SOURCES" >> "$GITHUB_OUTPUT"
            else
              echo "✓ 源数量未超过限制，无需截取"
              echo "limited=false" >> "$GITHUB_OUTPUT"
              echo "final_count=$count" >> "$GITHUB_OUTPUT"
            fi
          else
            echo "live_ok.txt 不存在"
            echo "limited=false" >> "$GITHUB_OUTPUT"
            echo "final_count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate M3U file
        run: |
          if [ -f live_ok.txt ]; then
            python3 << 'PYEOF'
          import sys
          with open('live_ok.txt','r',encoding='utf-8') as f:
              lines=[l.strip() for l in f if ',' in l]
          with open('live_ok.m3u','w',encoding='utf-8') as f:
              f.write('#EXTM3U\n\n')
              for line in lines:
                  parts=line.split(',',1)
                  if len(parts)==2:
                      name,url=parts
                      safe_name=name.replace('"','"')
                      f.write('#EXTINF:-1 tvg-name="{}",{}\n'.format(safe_name,safe_name))
                      f.write(url+'\n')
          print('Generated live_ok.m3u with {} channels'.format(len(lines)))
          PYEOF
            echo "M3U 文件生成完成"
          else
            echo "live_ok.txt 不存在，跳过 M3U 生成"
          fi

      - name: Commit and push results
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add live_ok.txt live_ok.m3u config.json .iptv_stats.json .iptv_cache.json 2>/dev/null || true
          if git diff --staged --quiet; then
            echo "无需更新"
          else
            count=$(wc -l < live_ok.txt 2>/dev/null || echo 0)
            git commit -m "chore: auto-update $(date +'%Y-%m-%d %H:%M') sources=${count}"
            git push || echo "Push failed"
          fi

  sync-to-gist:
    needs: iptv-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Sync to Gist
        if: needs.iptv-check.outputs.final_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          if [ -f live_ok.txt ]; then
            python3 << 'PYEOF'
          import json,subprocess,os
          with open('live_ok.txt','r',encoding='utf-8') as f: c=f.read()
          cnt=len([l for l in c.splitlines() if l.strip()])
          payload=json.dumps({'description':'IPTV | {} sources'.format(cnt),'files':{'IPTV.txt':{'content':c}}})
          subprocess.run(['curl','-s','-X','PATCH','-H','Authorization: token '+os.environ['GH_TOKEN'],'-H','Content-Type: application/json','https://api.github.com/gists/dc272a4f2e95ffbd41e7e31d27ef3d76','-d',payload])
          print('Gist synced: {} sources'.format(cnt))
          PYEOF
          fi

      - name: Create Release
        if: needs.iptv-check.outputs.final_count != '0'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          export TAG="v$(date +'%Y%m%d-%H%M')"
          export REPO="${{ github.repository }}"
          export CNT="${{ needs.iptv-check.outputs.final_count }}"
          python3 << 'PYEOF'
          import json,subprocess,os
          tag=os.environ['TAG']
          repo=os.environ['REPO']
          token=os.environ['GH_TOKEN']
          cnt=os.environ['CNT']
          body='自动更新 | {} sources\n\n影视仓：https://raw.githubusercontent.com/{}/master/live_ok.txt'.format(cnt,repo)
          payload=json.dumps({'tag_name':tag,'name':'IPTV {}'.format(tag),'body':body,'draft':False})
          subprocess.run(['curl','-s','-X','POST','-H','Authorization: token '+token,'-H','Content-Type: application/json','https://api.github.com/repos/'+repo+'/releases','-d',payload])
          print('Release created: {}'.format(tag))
          PYEOF
