name: IPTV Auto Check
on:
  schedule:
    - cron: '0 18 */2 * *'
  workflow_dispatch:
  push:
    branches:
      - master
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
jobs:
  iptv-check:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    outputs:
      final_count: ${{ steps.limit_check.outputs.final_count }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          lfs: false
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Cache pip packages
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-iptv-v1
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: pip install requests httpx zhconv tqdm m3u8

      - name: Install FFmpeg
        run: sudo apt-get update -qq && sudo apt-get install -y ffmpeg

      - name: Pre-check existing sources
        id: pre_check
        run: |
          if [ -f live_ok.txt ]; then
            count=$(wc -l < live_ok.txt | tr -d ' ')
            echo "count=$count" >> "$GITHUB_OUTPUT"
          else
            echo "count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Write Stage1 config (local only)
        run: |
          cat > config.json << 'EOF'
          {
            "ENABLE_WEB_CHECK": false,
            "ENABLE_WEB_FETCH": false,
            "ENABLE_LOCAL_CHECK": true,
            "ENABLE_SPEED_CHECK": true,
            "ENABLE_CACHE": true,
            "MAX_WORKERS": 80,
            "TIMEOUT_CN": 10,
            "TIMEOUT_OVERSEAS": 20,
            "RETRY_COUNT": 2,
            "MAX_LINKS_PER_NAME": 3,
            "FILTER_PRIVATE_IP": true,
            "ENABLE_QUALITY_FILTER": true,
            "MIN_QUALITY_SCORE": 15,
            "MIN_SPEED_MBPS": 0.5,
            "ENABLE_IPV6_OPTIMIZE": true,
            "ENABLE_RESOLUTION_FILTER": true,
            "MIN_WIDTH": 640,
            "MIN_HEIGHT": 480,
            "MAX_NEW_PLAYLISTS": 0,
            "PLAYLIST_QUALITY_SCORE": true
          }
          EOF

      - name: Run Stage1
        id: stage1
        run: |
          python IPTV-Apex-dzh.py 2>&1 | tee stage1.log
          STAGE1_COUNT=$(wc -l < live_ok.txt 2>/dev/null | tr -d ' ' || echo 0)
          echo "stage1_count=$STAGE1_COUNT" >> "$GITHUB_OUTPUT"
          echo "Stage1 result: $STAGE1_COUNT sources"

      - name: Write Stage2 config (preset sources)
        if: ${{ fromJson(steps.stage1.outputs.stage1_count) < 800 }}
        run: |
          cat > config.json << 'EOF'
          {
            "ENABLE_WEB_CHECK": true,
            "ENABLE_WEB_FETCH": true,
            "ENABLE_LOCAL_CHECK": true,
            "ENABLE_SPEED_CHECK": true,
            "ENABLE_CACHE": true,
            "MAX_WORKERS": 100,
            "TIMEOUT_CN": 10,
            "TIMEOUT_OVERSEAS": 20,
            "RETRY_COUNT": 2,
            "MAX_LINKS_PER_NAME": 3,
            "FILTER_PRIVATE_IP": true,
            "ENABLE_QUALITY_FILTER": true,
            "MIN_QUALITY_SCORE": 12,
            "MIN_SPEED_MBPS": 0.5,
            "ENABLE_IPV6_OPTIMIZE": true,
            "ENABLE_RESOLUTION_FILTER": true,
            "MIN_WIDTH": 640,
            "MIN_HEIGHT": 480,
            "MAX_NEW_PLAYLISTS": 50,
            "PLAYLIST_QUALITY_SCORE": true,
            "web_sources": [
              "https://iptv-org.github.io/iptv/index.m3u",
              "https://iptv-org.github.io/iptv/countries/cn.m3u",
              "https://iptv-org.github.io/iptv/countries/tw.m3u",
              "https://iptv-org.github.io/iptv/countries/hk.m3u",
              "https://raw.githubusercontent.com/fanmingming/live/main/tv.m3u"
            ]
          }
          EOF

      - name: Run Stage2
        id: stage2
        if: ${{ fromJson(steps.stage1.outputs.stage1_count) < 800 }}
        run: |
          python IPTV-Apex-dzh.py 2>&1 | tee stage2.log
          STAGE2_COUNT=$(wc -l < live_ok.txt 2>/dev/null | tr -d ' ' || echo 0)
          echo "stage2_count=$STAGE2_COUNT" >> "$GITHUB_OUTPUT"
          echo "Stage2 result: $STAGE2_COUNT sources"

      - name: Stage2 skip
        id: stage2_skip
        if: ${{ fromJson(steps.stage1.outputs.stage1_count) >= 800 }}
        run: |
          echo "stage2_count=${{ steps.stage1.outputs.stage1_count }}" >> "$GITHUB_OUTPUT"
          echo "Stage1 >= 800, skip Stage2"

      - name: Write Stage3 config (async crawl)
        if: ${{ fromJson(steps.stage2.outputs.stage2_count) < 800 }}
        run: |
          cat > config.json << 'EOF'
          {
            "ENABLE_WEB_CHECK": true,
            "ENABLE_WEB_FETCH": true,
            "ENABLE_LOCAL_CHECK": true,
            "ENABLE_SPEED_CHECK": true,
            "ENABLE_CACHE": true,
            "MAX_WORKERS": 120,
            "FETCH_WORKERS": 20,
            "TIMEOUT_CN": 10,
            "TIMEOUT_OVERSEAS": 20,
            "RETRY_COUNT": 2,
            "MAX_LINKS_PER_NAME": 3,
            "FILTER_PRIVATE_IP": true,
            "ENABLE_QUALITY_FILTER": true,
            "MIN_QUALITY_SCORE": 10,
            "MIN_SPEED_MBPS": 0.5,
            "ENABLE_IPV6_OPTIMIZE": true,
            "ENABLE_RESOLUTION_FILTER": true,
            "MIN_WIDTH": 640,
            "MIN_HEIGHT": 480,
            "MAX_NEW_PLAYLISTS": 100,
            "PLAYLIST_QUALITY_SCORE": true,
            "web_sources": [
              "https://iptv-org.github.io/iptv/index.m3u",
              "https://iptv-org.github.io/iptv/countries/cn.m3u",
              "https://iptv-org.github.io/iptv/countries/tw.m3u",
              "https://live.hacks.tools/iptv/languages/zho.m3u"
            ]
          }
          EOF

      - name: Run Stage3
        id: stage3
        if: ${{ fromJson(steps.stage2.outputs.stage2_count) < 800 }}
        run: |
          python IPTV-Apex-dzh.py --async-crawl 2>&1 | tee stage3.log
          STAGE3_COUNT=$(wc -l < live_ok.txt 2>/dev/null | tr -d ' ' || echo 0)
          echo "stage3_count=$STAGE3_COUNT" >> "$GITHUB_OUTPUT"
          echo "Stage3 result: $STAGE3_COUNT sources"

      - name: Stage3 skip
        id: stage3_skip
        if: ${{ fromJson(steps.stage2.outputs.stage2_count) >= 800 }}
        run: |
          echo "stage3_count=${{ steps.stage2.outputs.stage2_count }}" >> "$GITHUB_OUTPUT"
          echo "Stage2 >= 800, skip Stage3"

      - name: Run Stage4
        id: stage4
        if: ${{ fromJson(steps.stage3.outputs.stage3_count) < 800 }}
        run: |
          python auto1000.py 2>&1 | tee stage4.log
          STAGE4_COUNT=$(wc -l < live_ok.txt 2>/dev/null | tr -d ' ' || echo 0)
          echo "stage4_count=$STAGE4_COUNT" >> "$GITHUB_OUTPUT"
          echo "Stage4 result: $STAGE4_COUNT sources"

      - name: Stage4 skip
        if: ${{ fromJson(steps.stage3.outputs.stage3_count) >= 800 }}
        run: |
          echo "stage4_count=${{ steps.stage3.outputs.stage3_count }}" >> "$GITHUB_OUTPUT"
          echo "Stage3 >= 800, skip Stage4"

      - name: Post-process (dedup + Chinese priority)
        run: |
          cat > /tmp/post.py << 'ENDPY'
import os
if not os.path.exists('live_ok.txt'): 
    print("No file")
    exit(0)
with open('live_ok.txt', 'r', encoding='utf-8') as f:
    lines = [l.strip() for l in f if ',' in l.strip()]
# Dedupe: max 3 sources per channel name
channels = {}
for line in lines:
    parts = line.split(',', 1)
    if len(parts) != 2: continue
    name, url = parts
    name = name.strip()
    if name not in channels: channels[name] = []
    if len(channels[name]) < 3: channels[name].append((name, url))
# Chinese priority
def chinese_priority(name):
    cn_kw = ['CCTV', 'TVB', 'ATV', 'News', 'Sports', 'Kids', 'Movie', 'Drama',
             'Beijing', 'Shanghai', 'Guangdong', 'Zhejiang', 'Jiangsu', 'Hunan',
             'Taiwan', 'Hong Kong', 'Macau']
    for kw in cn_kw:
        if kw.lower() in name.lower(): return 0
    return 1
all_sources = [(chinese_priority(n), n, u) for n, urls in channels.items() for n, u in urls]
all_sources.sort(key=lambda x: (x[0], x[1]))
with open('live_ok.txt', 'w', encoding='utf-8') as f:
    for _, n, u in all_sources[:2000]: f.write(f'{n},{u}\n')
print(f'Post-process: {len(all_sources[:2000])} sources (Chinese: {sum(1 for x in all_sources[:2000] if x[0]==0)})')
ENDPY
          python3 /tmp/post.py

      - name: Limit to 2000
        id: limit_check
        run: |
          if [ -f live_ok.txt ]; then
            count=$(wc -l < live_ok.txt | tr -d ' ')
            if [ "$count" -gt 2000 ]; then head -n 2000 live_ok.txt > live_ok_temp.txt && mv live_ok_temp.txt live_ok.txt; fi
            echo "final_count=$(wc -l < live_ok.txt | tr -d ' ')" >> "$GITHUB_OUTPUT"
          else
            echo "final_count=0" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate M3U
        run: |
          cat > /tmp/m3u.py << 'ENDPY'
import os
if os.path.exists('live_ok.txt'):
    with open('live_ok.txt','r',encoding='utf-8') as f:
        lines=[l.strip() for l in f if ',' in l]
    with open('live_ok.m3u','w',encoding='utf-8') as f:
        f.write('#EXTM3U\n\n')
        for line in lines:
            parts=line.split(',',1)
            if len(parts)==2: f.write(f'#EXTINF:-1 tvg-name="{parts[0]}",{parts[0]}\n{parts[1]}\n')
    print('M3U done')
ENDPY
          python3 /tmp/m3u.py

      - name: Commit and push
        if: success()
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add live_ok.txt live_ok.m3u config.json .iptv_stats.json .iptv_cache.json 2>/dev/null || true
          if ! git diff --staged --quiet; then
            count=$(wc -l < live_ok.txt 2>/dev/null | tr -d ' ' || echo 0)
            git commit -m "chore: auto-update sources=${count}"
            git pull --rebase https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git master || true
            git push https://${{ secrets.GITHUB_TOKEN }}@github.com/${{ github.repository }}.git HEAD:master
          fi

  sync-to-gist:
    needs: iptv-check
    runs-on: ubuntu-latest
    if: needs.iptv-check.outputs.final_count != '0'
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - name: Sync to Gist
        env:
          GH_TOKEN: ${{ secrets.GIST_TOKEN }}
        run: |
          cat > /tmp/gist.py << 'ENDPY'
import os, requests
if os.path.exists('live_ok.txt'):
    with open('live_ok.txt','r',encoding='utf-8') as f: c = f.read()
    cnt = len([l for l in c.splitlines() if l.strip()])
    r = requests.patch('https://api.github.com/gists/dc272a4f2e95ffbd41e7e31d27ef3d76',
        headers={'Authorization': 'token ' + os.environ['GH_TOKEN'], 'Content-Type': 'application/json'},
        json={'description': 'IPTV | {} sources'.format(cnt), 'files': {'IPTV.txt': {'content': c}}})
    print('Gist: {} sources'.format(cnt) if r.status_code == 200 else 'Failed')
ENDPY
          python3 /tmp/gist.py

      - name: Wait cache
        run: sleep 30

      - name: Create Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          cat > /tmp/release.py << 'ENDPY'
import os, requests
tag = 'v' + str(os.environ.get('GITHUB_RUN_ID', 'manual'))
cnt = os.environ.get('FINAL_COUNT', '0')
r = requests.post('https://api.github.com/repos/litywang/IPTV/releases',
    headers={'Authorization': 'token ' + os.environ['GH_TOKEN'], 'Content-Type': 'application/json'},
    json={'tag_name': tag, 'name': 'IPTV ' + tag, 'body': 'Auto | {} sources'.format(cnt), 'draft': False})
print('Release:', tag)
ENDPY
          python3 /tmp/release.py
