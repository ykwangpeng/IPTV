name: IPTV Check

on:
  schedule:
    # 每天早上6点自动运行
    - cron: '0 6 * * *'
  workflow_dispatch:  # 手动触发
  push:
    branches:
      - master

jobs:
  iptv-check:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests httpx zhconv tqdm
          pip install m3u8 || true

      - name: Install FFmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Create config
        run: |
          cat > config.json << 'EOF'
          {
            "ENABLE_WEB_CHECK": true,
            "ENABLE_WEB_FETCH": false,
            "ENABLE_LOCAL_CHECK": false,
            "ENABLE_SPEED_CHECK": false,
            "ENABLE_CACHE": true,
            "DEBUG_MODE": false,
            "AUTO_BACKUP": false,
            "ARCHIVE_FAIL": true,
            "MAX_WORKERS": 10,
            "FETCH_WORKERS": 8,
            "TIMEOUT_CN": 15,
            "TIMEOUT_OVERSEAS": 30,
            "RETRY_COUNT": 2,
            "MAX_LINKS_PER_NAME": 3,
            "FILTER_PRIVATE_IP": true,
            "ENABLE_QUALITY_FILTER": true,
            "MIN_QUALITY_SCORE": 15,
            "MIN_SPEED_MBPS": 0.005,
            "ENABLE_IPV6_OPTIMIZE": true,
            "IPV6_DEFAULT_DELAY": 0.1,
            "IPV6_DEFAULT_SPEED": 10.0,
            "ENABLE_CACHE": true,
            "CACHE_TTL_HOURS": 24,
            "ENABLE_RESOLUTION_FILTER": false,
            "WEB_SOURCES": [
              "https://live.zbds.top/tv/iptv4.m3u",
              "https://raw.githubusercontent.com/imDazui/Tvlist-awesome-m3u-m3u8/master/m3u/台湾港澳.m3u",
              "https://raw.githubusercontent.com/hujingguang/ChinaIPTV/main/HongKong.m3u8",
              "https://raw.githubusercontent.com/hujingguang/ChinaIPTV/main/TaiWan.m3u8",
              "https://raw.githubusercontent.com/MichaelJorky/Free-IPTV-M3U-Playlist/main/iptv-hongkong.m3u",
              "https://peterhchina.github.io/iptv/CNTV-V4.m3u",
              "https://raw.githubusercontent.com/zxmlxw520/5566/refs/heads/main/fhtv.txt",
              "https://raw.githubusercontent.com/nianxinmj/nxpz/refs/heads/main/lib/live.txt",
              "https://raw.githubusercontent.com/big-mouth-cn/tv/main/iptv-ok.m3u",
              "https://live.264788.xyz/sub/02RvO5i5Zn1LSQUCr56kkUp2I9xa9A/txt",
              "https://dsj-1312694395.cos.ap-guangzhou.myqcloud.com/dsj10.1.txt",
              "https://iptv-org.github.io/iptv/countries/hk.m3u",
              "https://iptv-org.github.io/iptv/countries/tw.m3u",
              "https://raw.githubusercontent.com/develop202/migu_video/refs/heads/main/interface.txt",
              "https://raw.githubusercontent.com/Guovin/iptv-api/gd/output/result.txt",
              "https://raw.githubusercontent.com/fanmingming/live/main/tv.m3u",
              "https://iptv-org.github.io/iptv/countries/cn.m3u",
              "https://iptv-org.github.io/iptv/countries/mo.m3u",
              "https://iptv-org.github.io/iptv/index.m3u"
            ]
          }
          EOF

      - name: Run IPTV check
        run: python IPTV-Apex-dzh.py
        env:
          TZ: Asia/Shanghai

      - name: Commit results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add live_ok.txt live_ok_fail.txt config.json .iptv_stats.json 2>/dev/null || true
          git diff --staged --quiet || git commit -m "chore: 自动更新检测结果 $(date +'%Y-%m-%d %H:%M')"
          git push 2>/dev/null || echo "无需更新或推送失败"
